name: .NET CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependencias
        run: dotnet restore EstacionamentoConsole.sln

      - name: Compilar solucao
        run: dotnet build EstacionamentoConsole.sln --configuration Release --no-restore

      - name: Executar testes
        run: dotnet test Estacionamento.Tests/Estacionamento.Tests.csproj --configuration Release --no-build --verbosity normal