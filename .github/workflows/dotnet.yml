name: .NET CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore EstacionamentoConsole.sln

      - name: Build
        run: dotnet build EstacionamentoConsole.sln --no-restore

      - name: Test
        run: dotnet test Estacionamento.Tests/Estacionamento.Tests.csproj --no-build

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: annahermenegildo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: annahermenegildo/estacionamentoconsole:latest